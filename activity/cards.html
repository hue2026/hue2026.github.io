<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 4 — Character Archetypes Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:   #0b63ce;
    --green:  #10b981;
    --amber:  #f59e0b;
    --purple: #8b5cf6;
    --pink:   #ec4899;
    --red:    #ef4444;
    --bg:     #f4fbff;
    --surface:#ffffff;
    --text:   #1e293b;
    --muted:  #64748b;
    --border: #dbeafe;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 0.92rem;
    color: var(--muted);
    font-weight: 600;
  }

  /* ── Progress ── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    width: 100%;
    max-width: 640px;
  }
  .progress-track {
    flex: 1;
    height: 8px;
    background: #dbeafe;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  .progress-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--blue);
    min-width: 52px;
    text-align: right;
  }

  /* ── Card scene ── */
  .scene {
    width: min(92vw, 600px);
    height: 340px;
    perspective: 1200px;
    cursor: pointer;
    margin-bottom: 28px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  /* Both faces */
  .face {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 8px 32px rgba(11,99,206,0.13), 0 2px 8px rgba(11,99,206,0.07);
  }

  /* FRONT */
  .face-front {
    background: var(--surface);
    border: 2.5px solid var(--border);
  }
  .face-front .term-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .face-front .term {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.15;
  }
  .face-front .hint {
    margin-top: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #b0c4de;
  }

  /* BACK */
  .face-back {
    transform: rotateY(180deg);
    text-align: center;
  }
  .face-back .back-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.8;
  }
  .face-back .definition {
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    font-weight: 700;
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .face-back .example {
    font-size: 0.83rem;
    font-weight: 600;
    opacity: 0.85;
    font-style: italic;
    max-width: 38ch;
    line-height: 1.5;
  }

  /* Per-card accent colors applied via JS */

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 24px;
  }
  .btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 10px 28px;
    border-radius: 999px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.10); }
  .btn:active { transform: translateY(0); }
  .btn-prev { background: white; color: var(--blue); border-color: var(--border); }
  .btn-flip { background: var(--blue); color: white; }
  .btn-next { background: white; color: var(--blue); border-color: var(--border); }

  /* ── Dot nav ── */
  .dots {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 400px;
    margin-bottom: 28px;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #dbeafe;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    border: none;
  }
  .dot.active { background: var(--blue); transform: scale(1.3); }
  .dot.seen   { background: var(--green); }

  /* ── Shuffle / Reset row ── */
  .util-row {
    display: flex;
    gap: 10px;
  }
  .btn-util {
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 800;
    padding: 7px 18px;
    border-radius: 999px;
    border: 2px solid var(--border);
    background: white;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-util:hover { background: var(--bg); color: var(--text); }

  /* ── Keyboard hint ── */
  .kbd-hint {
    margin-top: 22px;
    font-size: 0.75rem;
    color: #b0c4de;
    font-weight: 700;
    text-align: center;
  }
  kbd {
    display: inline-block;
    background: white;
    border: 1.5px solid #dbeafe;
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 0.72rem;
    font-family: 'Nunito', sans-serif;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎴 Lesson 4 Flashcards</h1>
  <p>Character Development &amp; Archetypes · Click a card to flip it</p>
</div>

<div class="progress-row">
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:10%"></div></div>
  <div class="progress-label" id="prog-label">1 / 10</div>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face face-front" id="front">
      <div class="term-label">Term</div>
      <div class="term" id="front-term"></div>
      <div class="hint">click to reveal →</div>
    </div>
    <div class="face face-back" id="back">
      <div class="back-label" id="back-label">Definition</div>
      <div class="definition" id="back-def"></div>
      <div class="example" id="back-ex"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-prev" onclick="navigate(-1)">← Prev</button>
  <button class="btn btn-flip" onclick="flipCard()">↻ Flip</button>
  <button class="btn btn-next" onclick="navigate(1)">Next →</button>
</div>

<div class="dots" id="dots"></div>

<div class="util-row">
  <button class="btn-util" onclick="shuffleDeck()">🔀 Shuffle</button>
  <button class="btn-util" onclick="resetDeck()">↺ Reset</button>
</div>

<div class="kbd-hint">
  <kbd>Space</kbd> flip &nbsp;·&nbsp; <kbd>←</kbd><kbd>→</kbd> navigate &nbsp;·&nbsp; <kbd>S</kbd> shuffle
</div>

<script>
const CARDS = [
  {
    term: "Archetype",
    color: "#0b63ce",
    bg: "#eff6ff",
    definition: "A recurring character type or symbolic pattern found across many stories and cultures.",
    example: "The 'reluctant hero' is one of the most common archetypes in all of storytelling."
  },
  {
    term: "Protagonist",
    color: "#10b981",
    bg: "#ecfdf5",
    definition: "The main character whose journey drives the story forward — we follow their perspective, goals, and growth.",
    example: "Naruto Uzumaki (Naruto) and Izuku Midoriya (My Hero Academia) are classic protagonists."
  },
  {
    term: "Antagonist",
    color: "#ef4444",
    bg: "#fef2f2",
    definition: "A character or force that opposes the protagonist, creating the central conflict of the story.",
    example: "Pain in Naruto acts as an antagonist who challenges Naruto's beliefs about the shinobi world."
  },
  {
    term: "Character Arc",
    color: "#8b5cf6",
    bg: "#f5f3ff",
    definition: "The internal transformation a character undergoes across a story — how they change from beginning to end.",
    example: "Zuko's arc in Avatar goes from villain → conflicted prince → true hero."
  },
  {
    term: "Foil",
    color: "#f59e0b",
    bg: "#fffbeb",
    definition: "A character whose contrasting traits highlight qualities in another character, often the protagonist.",
    example: "Sasuke (Naruto) is a foil to Naruto — cold & calculated vs. warm & impulsive."
  },
  {
    term: "The Hero\nArchetype",
    color: "#0b63ce",
    bg: "#eff6ff",
    definition: "A character who accepts a call to adventure, faces trials, and grows through hardship to protect others.",
    example: "Deku (My Hero Academia) embodies the hero archetype — powerless at first but driven by selfless courage."
  },
  {
    term: "The Mentor\nArchetype",
    color: "#10b981",
    bg: "#ecfdf5",
    definition: "A wise guide who helps the hero develop their abilities and understand their purpose.",
    example: "All Might mentors Deku; Master Roshi mentors Goku — both pass on power AND wisdom."
  },
  {
    term: "The Rival\nArchetype",
    color: "#ec4899",
    bg: "#fdf2f8",
    definition: "A peer who challenges the protagonist through competition, pushing them to improve and grow.",
    example: "Bakugo is Deku's rival — their clashes force both characters to evolve beyond their limits."
  },
  {
    term: "Positive\nCharacter Arc",
    color: "#10b981",
    bg: "#ecfdf5",
    definition: "A character overcomes a personal flaw or false belief and becomes a better version of themselves by the end.",
    example: "Naruto grows from an ostracized troublemaker into the respected, compassionate Hokage."
  },
  {
    term: "Cultural\nArchetypes",
    color: "#8b5cf6",
    bg: "#f5f3ff",
    definition: "Archetypes shaped by Japanese values like ganbaru (perseverance), nakama (bonds), and giri (duty).",
    example: "The 'never give up' hero archetype in anime reflects ganbaru — a core Japanese cultural ideal."
  }
];

let deck = [...CARDS];
let current = 0;
let seen = new Set();
let isFlipped = false;

function buildDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  deck.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === current ? ' active' : '') + (seen.has(i) && i !== current ? ' seen' : '');
    d.setAttribute('aria-label', 'Card ' + (i+1));
    d.onclick = () => goTo(i);
    c.appendChild(d);
  });
}

function renderCard(animate) {
  const c = deck[current];
  const card = document.getElementById('card');

  // Always show front when navigating
  if (isFlipped) {
    card.classList.remove('flipped');
    isFlipped = false;
  }

  // Set front content
  document.getElementById('front-term').textContent = c.term;
  document.getElementById('front-term').style.color = c.color;
  document.getElementById('front').style.background = c.bg;
  document.getElementById('front').style.borderColor = c.color + '33';

  // Set back content
  document.getElementById('back-def').textContent = c.definition;
  document.getElementById('back-ex').textContent = c.example;
  document.getElementById('back').style.background = c.color;
  document.getElementById('back').style.color = 'white';
  document.getElementById('back-label').textContent = '✦ Definition';

  // Progress
  const pct = ((current + 1) / deck.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = (current + 1) + ' / ' + deck.length;

  buildDots();
}

function flipCard() {
  const card = document.getElementById('card');
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
  if (isFlipped) seen.add(current);
  buildDots();
}

function navigate(dir) {
  current = (current + dir + deck.length) % deck.length;
  renderCard(true);
}

function goTo(i) {
  current = i;
  renderCard(true);
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  seen.clear();
  renderCard(false);
}

function resetDeck() {
  deck = [...CARDS];
  current = 0;
  seen.clear();
  renderCard(false);
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  else if (e.key === 's' || e.key === 'S') { shuffleDeck(); }
});

// Init
renderCard(false);
</script>
</body>
</html>
